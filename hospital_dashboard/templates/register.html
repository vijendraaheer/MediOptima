<!DOCTYPE html>
<html>
<head>
<title>Medi Optima Register</title>

<style>

body{
font-family:Roboto;
background:#1a3e7a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:white;
padding:40px;
border-radius:10px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1a3e7a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="register-box">

<h2>Medi Optima Register</h2>

<form method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role">

<option value="doctor">Doctor</option>

<option value="staff">Staff</option>

</select>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>

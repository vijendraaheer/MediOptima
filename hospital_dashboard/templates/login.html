<!DOCTYPE html>
<html>
<head>
<title>Medi Optima Login</title>

<style>

body{
font-family:Roboto;
background:#1a3e7a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1a3e7a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

a{
text-decoration:none;
color:#1a3e7a;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Medi Optima Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p style="text-align:center;margin-top:10px;">
No account?
<a href="{{ url_for('register') }}">Register</a>
</p>

</div>

</body>
</html>
